  #info {

// ---------- Three.js Setup ----------
let camera, scene, renderer;
let objects = [];
let targets = { table: [], sphere: [], helix: [], grid: [] };

const TILE = 130; // tile width/height spacing

function makeTileTexture(el){
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const color = categoryColors[el[6]] || 0x718096;
  const hex = '#' + color.toString(16).padStart(6,'0');

  // background
  ctx.fillStyle = 'rgba(10,10,10,0.85)';
  ctx.fillRect(0,0,256,256);
  ctx.strokeStyle = hex;
  ctx.lineWidth = 6;
  ctx.strokeRect(3,3,250,250);

  ctx.fillStyle = hex;
  ctx.font = 'bold 18px Helvetica';
  ctx.textAlign = 'left';
  ctx.fillText(el[0], 16, 34); // atomic number

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 90px Helvetica';
  ctx.textAlign = 'center';
  ctx.fillText(el[1], 128, 150);

  ctx.fillStyle = hex;
  ctx.font = '20px Helvetica';
  ctx.fillText(el[2], 128, 185);

  ctx.font = '16px Helvetica';
  ctx.fillStyle = '#aaa';
  ctx.fillText(el[3], 128, 215);

  return new THREE.CanvasTexture(canvas);
}

function init(){
  camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 1, 10000);
  camera.position.z = 3000;

  scene = new THREE.Scene();

  // create objects
  elements.forEach((el, i) => {
    const tex = makeTileTexture(el);
    const material = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(TILE, TILE, 1);

    // random initial position
    sprite.position.x = Math.random()*4000 - 2000;
    sprite.position.y = Math.random()*4000 - 2000;
    sprite.position.z = Math.random()*4000 - 2000;

    scene.add(sprite);
    objects.push(sprite);
  });

  // ---- TABLE target positions ----
  elements.forEach((el) => {
    const col = el[4], row = el[5];
    const object = new THREE.Object3D();
    object.position.x = (col*TILE) - 1300;
    object.position.y = -(row*TILE) + 600;
    object.position.z = 0;
    targets.table.push(object);
  });

  // ---- SPHERE target positions ----
  const vector = new THREE.Vector3();
  const spherical = new THREE.Spherical();
  const l = elements.length;
  for (let i = 0; i < l; i++) {
    const phi = Math.acos(-1 + (2*i)/l);
    const theta = Math.sqrt(l*Math.PI) * phi;
    const object = new THREE.Object3D();
    spherical.set(900, phi, theta);
    object.position.setFromSpherical(spherical);
    vector.copy(object.position).multiplyScalar(2);
    object.lookAt(vector);
    targets.sphere.push(object);
  }

  // ---- HELIX target positions ----
  for (let i = 0; i < l; i++) {
    const theta = i * 0.175 + Math.PI;
    const y = -(i * 8) + 450;
    const object = new THREE.Object3D();
    object.position.setFromCylindricalCoords(900, theta, y);
    vector.x = object.position.x * 2;
    vector.y = object.position.y;
    vector.z = object.position.z * 2;
    object.lookAt(vector);
    targets.helix.push(object);
  }

  // ---- GRID target positions ----
  for (let i = 0; i < l; i++) {
    const object = new THREE.Object3D();
    object.position.x = ((i % 14) * 160) - 1100;
    object.position.y = (-(Math.floor(i/14) % 9) * 180) + 700;
    object.position.z = (Math.floor(i/(14*9))) * 800 - 800;
    targets.grid.push(object);
  }

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('container').appendChild(renderer.domElement);

  // Controls (simple orbit-like via mouse drag)
  setupControls();

  transform(targets.table, 1000);

  document.getElementById('btn-table').addEventListener('click', () => { setActive('btn-table'); transform(targets.table, 1500); });
  document.getElementById('btn-sphere').addEventListener('click', () => { setActive('btn-sphere'); transform(targets.sphere, 1500); });
  document.getElementById('btn-helix').addEventListener('click', () => { setActive('btn-helix'); transform(targets.helix, 1500); });
  document.getElementById('btn-grid').addEventListener('click', () => { setActive('btn-grid'); transform(targets.grid, 1500); });

  window.addEventListener('resize', onWindowResize);
}

function setActive(id){
  document.querySelectorAll('#menu button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ---- simple Tween (no external lib) ----
function tween(obj, to, duration, easing, onComplete){
  const start = {x:obj.x,y:obj.y,z:obj.z};
  const startTime = performance.now();
  function step(now){
    let t = Math.min(1, (now-startTime)/duration);
    const e = easing(t);
    obj.x = start.x + (to.x-start.x)*e;
    obj.y = start.y + (to.y-start.y)*e;
    obj.z = start.z + (to.z-start.z)*e;
    if (t < 1) requestAnimationFrame(step);
    else if (onComplete) onComplete();
  }
  requestAnimationFrame(step);
}
function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function transform(targetArr, duration){
  for (let i = 0; i < objects.length; i++){
    const object = objects[i];
    const target = targetArr[i];
    tween(object.position, target.position, duration, easeInOutCubic);

    // rotation tween (manual, simple lerp via quaternion slerp)
    const startQ = object.quaternion.clone();
    const endQ = new THREE.Quaternion().setFromEuler(target.rotation);
    const startTime = performance.now();
    (function(obj, sQ, eQ, st){
      function step(now){
        let t = Math.min(1, (now-st)/duration);
        const e = easeInOutCubic(t);
        obj.quaternion.slerpQuaternions(sQ, eQ, e);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    })(object, startQ, endQ, startTime);
  }
}

// ---- Mouse drag rotation + zoom controls ----
let isDragging = false, prevX = 0, prevY = 0;
let rotation = { x: 0, y: 0 };
let targetRotation = { x: 0, y: 0 };
let distance = 3000;
let targetDistance = 3000;

function setupControls(){
  const dom = renderer ? renderer.domElement : window;
  window.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    targetRotation.y += dx * 0.005;
    targetRotation.x += dy * 0.005;
    prevX = e.clientX; prevY = e.clientY;
  });
  window.addEventListener('wheel', e => {
    targetDistance += e.deltaY * 0.8;
    targetDistance = Math.max(500, Math.min(6000, targetDistance));
  });
  // touch
  let lastTouch = null;
  window.addEventListener('touchstart', e => { if(e.touches.length===1){ lastTouch = e.touches[0]; }});
  window.addEventListener('touchmove', e => {
    if(e.touches.length===1 && lastTouch){
      const t = e.touches[0];
      const dx = t.clientX - lastTouch.clientX;
      const dy = t.clientY - lastTouch.clientY;
      targetRotation.y += dx * 0.005;
      targetRotation.x += dy * 0.005;
      lastTouch = t;
    }
  });
}

function onWindowResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate(){
  requestAnimationFrame(animate);

  rotation.x += (targetRotation.x - rotation.x) * 0.05;
  rotation.y += (targetRotation.y - rotation.y) * 0.05;
  distance += (targetDistance - distance) * 0.1;

  camera.position.x = distance * Math.sin(rotation.y) * Math.cos(rotation.x);
  camera.position.z = distance * Math.cos(rotation.y) * Math.cos(rotation.x);
  camera.position.y = distance * Math.sin(rotation.x);
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

init();
animate();
</script>
